<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 메모장</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', '맑은 고딕', sans-serif;
      background: #f0f4f8;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 24px;
      color: #1a1a2e;
    }

    .container { max-width: 720px; margin: 0 auto; }

    /* 탭 */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      padding: 14px 8px;
      font-size: 1.05rem;
      font-weight: 700;
      border: 2px solid #d0d7e3;
      border-radius: 12px;
      background: #fff;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: #4a6cf7;
      color: #fff;
      border-color: #4a6cf7;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* 카드 공통 */
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 28px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }

    .card h2 {
      font-size: 1.3rem;
      margin-bottom: 20px;
      color: #2d3a8c;
    }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"] {
      width: 100%;
      padding: 14px 16px;
      font-size: 1.15rem;
      border: 2px solid #d0d7e3;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
      background: #fafbff;
    }

    input:focus { border-color: #4a6cf7; background: #fff; }

    .pw-wrapper { position: relative; }
    .pw-wrapper input { padding-right: 56px; }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.3rem;
      padding: 4px;
      color: #666;
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background: #4a6cf7;
      color: #fff;
      font-size: 1.2rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: #2d4fd6; }
    .btn-primary:disabled { background: #aab4e8; cursor: not-allowed; }

    /* 검색 */
    .search-area { margin-bottom: 20px; }
    .search-area input {
      width: 100%;
      padding: 14px 16px;
      font-size: 1.15rem;
      border: 2px solid #d0d7e3;
      border-radius: 10px;
      outline: none;
      background: #fff;
      transition: border-color 0.2s;
    }
    .search-area input:focus { border-color: #4a6cf7; }

    /* 목록 */
    .list-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #2d3a8c;
      margin-bottom: 12px;
    }

    .empty-msg {
      text-align: center;
      color: #999;
      font-size: 1.1rem;
      padding: 40px 0;
    }

    .item-card {
      background: #fff;
      border-radius: 14px;
      padding: 20px 20px 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      margin-bottom: 14px;
    }

    .item-site {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 14px;
      word-break: break-all;
    }

    .item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .item-label { font-size: 1rem; color: #666; min-width: 64px; font-weight: 600; }
    .item-value { font-size: 1.05rem; color: #222; flex: 1; word-break: break-all; }
    .item-value.masked { letter-spacing: 3px; color: #555; }

    .btn-copy {
      padding: 8px 16px;
      background: #e8edff;
      color: #2d4fd6;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .btn-copy:hover { background: #c7d4ff; }
    .btn-copy.copied { background: #d4edda; color: #1a7a3a; }

    .item-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 12px;
      border-top: 1px solid #f0f0f0;
      padding-top: 12px;
    }

    .btn-delete {
      padding: 8px 16px;
      background: #fff0f0;
      color: #c0392b;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-delete:hover { background: #ffd5d5; }

    /* ── 유출 조회 탭 ── */
    .breach-notice {
      background: #fff8e1;
      border-left: 4px solid #f59e0b;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 1rem;
      color: #7a5c00;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    #breachResult { margin-top: 20px; }

    .breach-safe {
      text-align: center;
      padding: 28px 16px;
      background: #e8f8ef;
      border-radius: 14px;
      font-size: 1.15rem;
      color: #1a7a3a;
      font-weight: 700;
    }

    .breach-found-header {
      font-size: 1.1rem;
      font-weight: 700;
      color: #c0392b;
      margin-bottom: 14px;
      padding: 14px 16px;
      background: #fff0f0;
      border-radius: 10px;
    }

    .breach-item {
      background: #fff;
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      border-left: 4px solid #e74c3c;
    }

    .breach-item-name {
      font-size: 1.15rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .breach-item-domain {
      font-size: 0.95rem;
      color: #888;
      margin-bottom: 8px;
    }

    .breach-item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .breach-tag {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.88rem;
      font-weight: 600;
      background: #f0f4f8;
      color: #555;
    }

    .breach-tag.date { background: #e8edff; color: #2d4fd6; }
    .breach-tag.data { background: #fff3e0; color: #b45309; }

    .breach-error {
      text-align: center;
      padding: 24px 16px;
      background: #f8f9fa;
      border-radius: 14px;
      font-size: 1rem;
      color: #555;
      line-height: 1.7;
    }

    .breach-error a {
      color: #4a6cf7;
      font-weight: 700;
      text-decoration: none;
    }

    .loading-spinner {
      text-align: center;
      padding: 32px;
      font-size: 1.1rem;
      color: #888;
    }

    /* 토스트 */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #222;
      color: #fff;
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 1.05rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 9999;
    }

    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      h1 { font-size: 1.6rem; }
      .item-row { flex-wrap: wrap; }
      .tab-btn { font-size: 0.95rem; padding: 12px 4px; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🔐 비밀번호 메모장</h1>

  <!-- 탭 버튼 -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('memo')">📝 비밀번호 저장</button>
    <button class="tab-btn" onclick="switchTab('breach')">🔎 이메일 유출 조회</button>
  </div>

  <!-- ── 탭 1: 비밀번호 저장 ── -->
  <div id="tab-memo" class="tab-panel active">

    <div class="card">
      <h2>새 항목 저장</h2>
      <div class="form-group">
        <label for="site">사이트 이름</label>
        <input type="text" id="site" placeholder="예: 네이버, 카카오, 구글" />
      </div>
      <div class="form-group">
        <label for="userId">아이디</label>
        <input type="text" id="userId" placeholder="아이디 또는 이메일" autocomplete="off" />
      </div>
      <div class="form-group">
        <label for="pw">비밀번호</label>
        <div class="pw-wrapper">
          <input type="password" id="pw" placeholder="비밀번호 입력" autocomplete="off" />
          <button class="toggle-pw" onclick="togglePw()" title="비밀번호 보기/숨기기">👁</button>
        </div>
      </div>
      <button class="btn-primary" onclick="saveItem()">저장하기</button>
    </div>

    <div class="search-area">
      <input type="text" id="search" placeholder="🔍 사이트 이름으로 검색..." oninput="renderList()" />
    </div>

    <div class="list-title" id="listTitle"></div>
    <div id="list"></div>
  </div>

  <!-- ── 탭 2: 이메일 유출 조회 ── -->
  <div id="tab-breach" class="tab-panel">

    <div class="card">
      <h2>🔎 이메일 유출 조회</h2>
      <div class="breach-notice">
        ⚠️ 이메일 주소를 입력하면 <b>어느 사이트에서 개인정보가 유출됐는지</b> 조회합니다.<br>
        유출된 사이트 = 가입한 사이트라는 증거가 됩니다.<br>
        <small style="color:#a07000">※ 해킹 피해가 없는 사이트는 목록에 나오지 않을 수 있습니다.</small>
      </div>
      <div class="form-group">
        <label for="breachEmail">내 이메일 주소</label>
        <input type="email" id="breachEmail" placeholder="example@gmail.com" />
      </div>
      <button class="btn-primary" id="breachBtn" onclick="checkBreach()">유출 조회하기</button>
    </div>

    <div id="breachResult"></div>
  </div>
</div>

<div id="toast"></div>

<script>
  /* ── 탭 전환 ── */
  function switchTab(name) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    event.currentTarget.classList.add('active');
  }

  /* ── 비밀번호 저장 탭 ── */
  const STORAGE_KEY = 'passecure_items';

  function loadItems() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function saveItems(items) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }

  function saveItem() {
    const site   = document.getElementById('site').value.trim();
    const userId = document.getElementById('userId').value.trim();
    const pw     = document.getElementById('pw').value;

    if (!site)   { showToast('사이트 이름을 입력해 주세요.'); return; }
    if (!userId) { showToast('아이디를 입력해 주세요.'); return; }
    if (!pw)     { showToast('비밀번호를 입력해 주세요.'); return; }

    const items = loadItems();
    items.unshift({ id: Date.now(), site, userId, pw });
    saveItems(items);

    document.getElementById('site').value = '';
    document.getElementById('userId').value = '';
    document.getElementById('pw').value = '';

    showToast('저장되었습니다!');
    renderList();
  }

  function deleteItem(id) {
    if (!confirm('이 항목을 삭제할까요?')) return;
    saveItems(loadItems().filter(item => item.id !== id));
    renderList();
    showToast('삭제되었습니다.');
  }

  function copyText(itemId, field, btnEl) {
    const item = loadItems().find(i => i.id === itemId);
    if (!item) return;
    const text = field === 'userId' ? item.userId : item.pw;

    navigator.clipboard.writeText(text).then(() => {
      markCopied(btnEl);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;opacity:0';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      markCopied(btnEl);
    });
  }

  function markCopied(btnEl) {
    btnEl.textContent = '복사됨 ✓';
    btnEl.classList.add('copied');
    setTimeout(() => { btnEl.textContent = '복사'; btnEl.classList.remove('copied'); }, 1800);
  }

  function togglePw() {
    const input = document.getElementById('pw');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  function renderList() {
    const query    = document.getElementById('search').value.trim().toLowerCase();
    const items    = loadItems();
    const filtered = query ? items.filter(i => i.site.toLowerCase().includes(query)) : items;

    document.getElementById('listTitle').textContent = `저장된 항목 (${filtered.length}개)`;

    if (filtered.length === 0) {
      document.getElementById('list').innerHTML =
        `<p class="empty-msg">${query ? '검색 결과가 없습니다.' : '저장된 항목이 없습니다.'}</p>`;
      return;
    }

    document.getElementById('list').innerHTML = filtered.map(item => `
      <div class="item-card">
        <div class="item-site">🌐 ${escHtml(item.site)}</div>
        <div class="item-row">
          <span class="item-label">아이디</span>
          <span class="item-value">${escHtml(item.userId)}</span>
          <button class="btn-copy" onclick="copyText(${item.id},'userId',this)">복사</button>
        </div>
        <div class="item-row">
          <span class="item-label">비밀번호</span>
          <span class="item-value masked">••••••••</span>
          <button class="btn-copy" onclick="copyText(${item.id},'pw',this)">복사</button>
        </div>
        <div class="item-actions">
          <button class="btn-delete" onclick="deleteItem(${item.id})">삭제</button>
        </div>
      </div>
    `).join('');
  }

  /* ── 이메일 유출 조회 탭 ── */
  async function checkBreach() {
    const email = document.getElementById('breachEmail').value.trim();
    if (!email || !email.includes('@')) {
      showToast('이메일 주소를 올바르게 입력해 주세요.');
      return;
    }

    const btn = document.getElementById('breachBtn');
    const resultEl = document.getElementById('breachResult');

    btn.disabled = true;
    btn.textContent = '조회 중...';
    resultEl.innerHTML = '<div class="loading-spinner">🔍 조회 중입니다... 잠시만 기다려 주세요.</div>';

    try {
      const res = await fetch(
        'https://api.xposedornot.com/v1/check-email/' + encodeURIComponent(email),
        { headers: { 'Accept': 'application/json' } }
      );

      if (res.status === 404) {
        resultEl.innerHTML = `
          <div class="breach-safe">
            ✅ 다행이에요!<br><br>
            <b>${escHtml(email)}</b> 주소는<br>
            알려진 유출 사고에서 발견되지 않았습니다.
          </div>`;
        return;
      }

      if (!res.ok) throw new Error('API 오류');

      const data = await res.json();
      const breaches = data?.ExposedBreaches?.breaches_details || [];

      if (breaches.length === 0) {
        resultEl.innerHTML = `
          <div class="breach-safe">
            ✅ 다행이에요!<br><br>
            <b>${escHtml(email)}</b> 주소는<br>
            알려진 유출 사고에서 발견되지 않았습니다.
          </div>`;
        return;
      }

      resultEl.innerHTML = `
        <div class="breach-found-header">
          ⚠️ <b>${escHtml(email)}</b> 주소가 <b>${breaches.length}개</b> 사이트 유출 사고에서 발견됐습니다.<br>
          <span style="font-size:0.95rem;font-weight:400;">아래 사이트들은 가입된 사이트일 가능성이 높습니다. 비밀번호를 바꿔두세요!</span>
        </div>
        ${breaches.map(b => `
          <div class="breach-item">
            <div class="breach-item-name">🌐 ${escHtml(b.breach || '알 수 없음')}</div>
            ${b.domain ? `<div class="breach-item-domain">${escHtml(b.domain)}</div>` : ''}
            <div class="breach-item-meta">
              ${b.xposed_date ? `<span class="breach-tag date">📅 유출일: ${escHtml(b.xposed_date)}</span>` : ''}
              ${b.xposed_data ? b.xposed_data.split(';').map(d =>
                `<span class="breach-tag data">${escHtml(d.trim())}</span>`
              ).join('') : ''}
            </div>
          </div>
        `).join('')}`;

    } catch (err) {
      resultEl.innerHTML = `
        <div class="breach-error">
          😥 조회에 실패했습니다.<br><br>
          브라우저 보안 설정으로 인해 직접 조회가 안 될 수 있어요.<br><br>
          아래 링크에서 직접 확인해 보세요:<br><br>
          <a href="https://haveibeenpwned.com/account/${encodeURIComponent(email)}" target="_blank" rel="noopener">
            🔗 haveibeenpwned.com 에서 확인하기
          </a>
        </div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = '유출 조회하기';
    }
  }

  /* ── 공통 유틸 ── */
  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
  }

  /* 엔터키로 저장 */
  ['site','userId','pw'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') saveItem();
    });
  });
  document.getElementById('breachEmail').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkBreach();
  });

  renderList();
</script>

</body>
</html>
